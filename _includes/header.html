<header class="site-header">
  <div class="header-container">

    <!-- Brand Logo — fixed left -->
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Axomiya IT Labs — Home">
      <img src="{{ '/assets/images/icons/icon.svg' | relative_url }}" alt="Axomiya IT Labs" class="logo-svg" width="34" height="34">
      <span class="logo-text">Axomiya IT Labs</span>
    </a>

    <!-- Spacer — pushes nav to start from visual centre on desktop -->
    <div class="header-spacer" aria-hidden="true"></div>

    <!-- Desktop & Mobile Navigation -->
    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      <ul class="nav-list">
        {% for item in site.data.navigation %}
          <li class="nav-item{% if item.dropdown %} has-dropdown{% endif %}" id="nav-item-{{ forloop.index }}">
            {% if item.dropdown %}
              <button
                class="nav-link nav-link--btn {% if page.url == item.link %}active{% endif %}"
                aria-haspopup="true"
                aria-expanded="false"
                data-dropdown="dropdown-{{ forloop.index }}"
              >
                {{ item.name }}
                <span class="dropdown-arrow" aria-hidden="true">
                  <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
              </button>
              <ul class="dropdown-menu" id="dropdown-{{ forloop.index }}" role="menu">
                {% for subitem in item.dropdown %}
                  <li role="none">
                    <a href="{{ subitem.link | relative_url }}" class="dropdown-item {% if page.url == subitem.link %}active{% endif %}" role="menuitem">
                      {{ subitem.name }}
                    </a>
                  </li>
                {% endfor %}
              </ul>
            {% else %}
              <a href="{{ item.link | relative_url }}" class="nav-link {% if page.url == item.link %}active{% endif %}">
                {{ item.name }}
              </a>
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    </nav>

    <!-- Mobile hamburger — always visible on mobile -->
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="site-nav">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

  </div>
</header>

<script>
(function () {
  // ── Hamburger / mobile drawer ──────────────────────────────
  var toggle = document.getElementById('mobile-menu-toggle');
  var nav    = document.getElementById('site-nav');

  function openMobileNav() {
    nav.classList.add('open');
    toggle.classList.add('is-open');
    toggle.setAttribute('aria-expanded', 'true');
    toggle.setAttribute('aria-label', 'Close navigation menu');
    document.body.style.overflow = 'hidden';
  }

  function closeMobileNav() {
    nav.classList.remove('open');
    toggle.classList.remove('is-open');
    toggle.setAttribute('aria-expanded', 'false');
    toggle.setAttribute('aria-label', 'Open navigation menu');
    document.body.style.overflow = '';
  }

  if (toggle && nav) {
    toggle.addEventListener('click', function (e) {
      e.stopPropagation();
      if (nav.classList.contains('open')) { closeMobileNav(); } else { openMobileNav(); }
    });

    // Escape key closes mobile nav
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeMobileNav();
        closeAllDropdowns();
      }
    });
  }

  // ── Click-only dropdowns (desktop + mobile) ────────────────
  var dropdownBtns = document.querySelectorAll('[data-dropdown]');

  function closeAllDropdowns(except) {
    dropdownBtns.forEach(function (btn) {
      if (btn === except) return;
      var menuId = btn.getAttribute('data-dropdown');
      var menu   = document.getElementById(menuId);
      if (menu) {
        menu.classList.remove('is-open');
        menu.removeAttribute('style');
      }
      btn.setAttribute('aria-expanded', 'false');
      btn.classList.remove('dropdown-open');
      // Reset arrow
      var arrow = btn.querySelector('.dropdown-arrow');
      if (arrow) arrow.classList.remove('rotated');
    });
  }

  dropdownBtns.forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var menuId  = btn.getAttribute('data-dropdown');
      var menu    = document.getElementById(menuId);
      var isOpen  = menu && menu.classList.contains('is-open');
      var arrow   = btn.querySelector('.dropdown-arrow');

      closeAllDropdowns(btn);

      if (!isOpen && menu) {
        menu.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        btn.classList.add('dropdown-open');
        if (arrow) arrow.classList.add('rotated');
      } else {
        if (arrow) arrow.classList.remove('rotated');
        btn.setAttribute('aria-expanded', 'false');
        btn.classList.remove('dropdown-open');
      }
    });
  });

  // Close dropdowns when clicking anywhere outside nav
  document.addEventListener('click', function () {
    closeAllDropdowns();
    // Do NOT close mobile nav here — that needs explicit toggle click
  });

  // Prevent nav clicks from bubbling to document and closing themselves
  if (nav) {
    nav.addEventListener('click', function (e) {
      // Only stop propagation for non-link elements
      if (!e.target.closest('a')) e.stopPropagation();
    });
  }

})();
</script>
