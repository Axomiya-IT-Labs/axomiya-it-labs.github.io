<div class="author-posts">
  <h2>Posts by {{ page.title | replace: "Posts by ", "" }}</h2>
  <ul class="post-list">
    {% for post in page.posts %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
      </li>
    {% endfor %}
  </ul>
</div>
