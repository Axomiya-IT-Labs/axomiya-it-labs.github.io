<div class="community-stats-grid">
    <div class="stat-card">
        <div class="stat-number">{{ site.data.community.stats.total_members }}+</div>
        <div class="stat-label">Community Members</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ site.data.community.stats.active_contributors }}</div>
        <div class="stat-label">Active Contributors</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ site.data.community.stats.projects }}</div>
        <div class="stat-label">Open Source Projects</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">{{ site.data.community.stats.countries }}</div>
        <div class="stat-label">Countries Represented</div>
    </div>
</div>
