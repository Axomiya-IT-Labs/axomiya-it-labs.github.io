<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#141413">
    <meta name="google-site-verification" content="jMGTibDbaLBTjbKzOc91RrZOT7_FmX_YlYDHisNURfs" />

    {% seo %}

    <!-- Favicon / Canonical Browser Icons -->
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/icons/icon.svg' | relative_url }}">
    <link rel="shortcut icon" type="image/svg+xml" href="{{ '/assets/images/icons/icon.svg' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/icons/icon.svg' | relative_url }}">

    <!-- Google Fonts: Plus Jakarta Sans & Inter (OpenAI Style Typography) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    
    {% feed_meta %}
</head>
<body>
    {% include header.html %}
    
    <main class="main-content">
        {{ content }}
    </main>
    
    {% include footer.html %}
    
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
