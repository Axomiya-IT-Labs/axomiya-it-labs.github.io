title: Axomiya IT Labs
description: "Equal Access for All — Making AI Easy for Everyone."
url: "https://axomiya-it-labs.github.io"
baseurl: ""

author:
  name: Rakibul Islam
  twitter: axomiyaindie

twitter:
  username: AxomiyaITLabs

facebook:
  publisher: AxomiyaITLabs

logo: /assets/images/icons/icon.svg
telegram: https://t.me/AxomiyaITLabs
facebook_page: https://www.facebook.com/AxomiyaITLabs
facebook_group: https://www.facebook.com/groups/1556385872564016/
youtube: https://www.youtube.com/@AxomiyaITLabs
instagram: https://www.instagram.com/axomiyaitlabs
linkedin_company: https://www.linkedin.com/company/axomiya-it-labs
twitter_url: https://x.com/AxomiyaITLabs
email: axomiyaitlabs@gmail.com

image: /assets/images/og-image.webp

markdown: kramdown
sass:
  style: compressed

collections:
  projects:
    output: true
    permalink: /projects/:slug/
  announcements:
    output: true
    permalink: /announcements/:slug/

plugins:
  - jekyll-sass-converter
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - PROJECT.md
  - PROJECTS.md
  - node_modules

# AI Chat Configuration
ai_chat:
  enabled: true
  api_key: "your-api-key-here"
  model: "gemini-pro"
  api_url: "https://api.gemini.com/v1/chat"
  welcome_message: "Welcome to Axomiya IT Labs! How can I help you today?"
  community_context:
    description: "Axomiya IT Labs community for open source AI development"
    members: 245
    projects: 12

# Blog Generator Configuration
blog_generator:
  auto_categories: true
  auto_authors: true
  monthly_archives: true
  yearly_archives: true
  related_posts: true